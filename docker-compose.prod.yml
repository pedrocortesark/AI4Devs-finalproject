# Docker Compose for LOCAL TESTING of production images
# Usage: docker compose -f docker-compose.prod.yml up
# 
# WARNING: This is NOT for actual production deployment (use Railway/AWS/K8s)
# Purpose: Validate prod Dockerfiles work correctly before deploying

services:
  backend:
    build:
      context: ./src/backend
      target: prod  # Build production stage
    container_name: sf-pm-backend-prod
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_PASSWORD=${REDIS_PASSWORD}  # Used by config.py to build CELERY_BROKER_URL with URL encoding
      - PYTHONPATH=/app:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/ready\")'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.sagradafamilia.environment=production-test"
      - "com.sagradafamilia.service=backend"
    networks:
      - sf-network

  db:
    image: postgres:15-alpine
    container_name: sf-pm-db-prod
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - sf-network

  frontend:
    build:
      context: ./src/frontend
      target: prod  # Build production stage (nginx)
    container_name: sf-pm-frontend-prod
    ports:
      - "127.0.0.1:8080:8080"  # Nginx listens on 8080
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      - "com.sagradafamilia.environment=production-test"
      - "com.sagradafamilia.service=frontend"
    networks:
      - sf-network

  redis:
    image: redis:7-alpine
    container_name: sf-pm-redis-prod
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sf-network

  agent-worker:
    build:
      context: ./src/agent
      target: prod  # Build production stage
    container_name: sf-pm-agent-worker-prod
    env_file:
      - .env
    tmpfs:
      - /tmp:size=2G,mode=1777
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}  # Used by config.py to build CELERY_BROKER_URL with URL encoding
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - sf-network
    command: celery -A celery_app worker --loglevel=warning --concurrency=4
    restart: unless-stopped
    labels:
      - "com.sagradafamilia.environment=production-test"
      - "com.sagradafamilia.service=agent-worker"
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  sf-network:
    driver: bridge

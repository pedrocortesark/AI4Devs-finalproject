services:
  backend:
    build:
      context: ./src/backend
      target: dev
    container_name: sf-pm-backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"  # Localhost only for security
    volumes:
      - ./src/backend:/app
      - ./tests:/app/tests
      - ./infra:/app/infra
      - ./src/agent:/app/src/agent  # Mount agent module for test imports
      - ./supabase:/app/supabase  # Mount migrations for test verification
      - ./docs:/app/docs  # Mount docs for spec file tests
    environment:
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - PYTHONPATH=/app:/app/src  # Enable imports from agent module
    # Run container as non-root user (uid=1000 matches Dockerfile)
    user: "1000:1000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/ready\")'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: "no"  # Dev mode: don't auto-restart (facilitates debugging)
    labels:
      - "com.sagradafamilia.environment=development"
      - "com.sagradafamilia.service=backend"
    networks:
      - sf-network

  frontend:
    build:
      context: ./src/frontend
      target: dev
    container_name: sf-pm-frontend
    working_dir: /app
    ports:
      - "127.0.0.1:5173:5173"  # Localhost only for security
    volumes:
      - ./src/frontend:/app
      - frontend_node_modules:/app/node_modules  # Named volume to persist node_modules with correct permissions
    environment:
      - VITE_API_URL=http://localhost:8000
    # DEV MODE: Run as root to avoid node_modules permission issues with volumes
    # Production uses non-root user in Dockerfile (viteuser uid=1002)
    user: "root"
    command: bash -c "[ -d node_modules ] || npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: "no"  # Dev mode: don't auto-restart
    labels:
      - "com.sagradafamilia.environment=development"
      - "com.sagradafamilia.service=frontend"
    networks:
      - sf-network

  redis:
    image: redis:7-alpine
    container_name: sf-pm-redis
    ports:
      - "127.0.0.1:6379:6379"  # Localhost only for security
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    networks:
      - sf-network

  agent-worker:
    build:
      context: ./src/agent
      target: dev
    container_name: sf-pm-agent-worker
    env_file:
      - .env
    volumes:
      - ./src/agent:/app
      - ./src:/app/src  # Mount src parent for test imports (src.agent.*)
      - ./tests:/app/tests
      - ./infra:/app/infra  # Required for supabase_client imports in tests
    # Tmpfs for temporary .3dm files (faster, auto-cleanup on container stop)
    tmpfs:
      - /tmp:size=2G,mode=1777
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=${SUPABASE_DATABASE_URL}
      - PYTHONPATH=/app  # Ensure proper Python import paths
    # Run container as non-root user (uid=1001 matches Dockerfile)
    user: "1001:1001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sf-network
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    restart: "no"  # Dev mode: don't auto-restart
    labels:
      - "com.sagradafamilia.environment=development"
      - "com.sagradafamilia.service=agent-worker"
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  redis_data:
  frontend_node_modules:  # Named volume for frontend dependencies (preserves permissions)


networks:
  sf-network:
    driver: bridge

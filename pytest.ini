[pytest]
# Configuración de pytest para SF-PM project
# Registra markers personalizados para evitar warnings "Unknown pytest.mark"

markers =
    integration: Mark test as integration test (requires database/redis connectivity)
    slow: Mark test as slow (typically file processing, long-running operations)
    unit: Mark test as unit test (fast, no external dependencies)
    e2e: Mark test as end-to-end test (full workflow validation)

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Output configuration
console_output_style = progress
addopts = 
    --strict-markers
    --tb=short
    -ra
